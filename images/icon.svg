<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- File body gradient -->
    <linearGradient id="fileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AD4B8"/>
      <stop offset="100%" stop-color="#3BA590"/>
    </linearGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>

    <!-- Top shine -->
    <radialGradient id="shine" cx="0.5" cy="0" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <filter id="badgeShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- Subtle border/edge highlight -->
  <rect x="1" y="1" width="254" height="254" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Glass overlay top half -->
  <rect width="256" height="128" fill="url(#glass)"/>

  <!-- Top shine -->
  <rect width="256" height="256" fill="url(#shine)"/>

  <!-- File icon with shadow -->
  <g filter="url(#shadow)">
    <path d="M66 40h78l46 46v130c0 7.7-6.3 14-14 14H66c-7.7 0-14-6.3-14-14V54c0-7.7 6.3-14 14-14z" fill="url(#fileBg)"/>
    <path d="M144 40v46h46" fill="#3A3A3A"/>
  </g>

  <!-- File border -->
  <path d="M66 40h78l46 46v130c0 7.7-6.3 14-14 14H66c-7.7 0-14-6.3-14-14V54c0-7.7 6.3-14 14-14z" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <path d="M144 40v46h46" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-linejoin="round"/>

  <!-- File inner glass sheen -->
  <path d="M66 40h78v46h46v10H52V54c0-7.7 6.3-14 14-14z" fill="#ffffff" opacity="0.04"/>

  <!-- Line numbers -->
  <rect x="64" y="110" width="12" height="4" rx="2" fill="#555"/>
  <rect x="64" y="124" width="12" height="4" rx="2" fill="url(#accent)"/>
  <rect x="64" y="138" width="12" height="4" rx="2" fill="url(#accent)"/>
  <rect x="64" y="152" width="12" height="4" rx="2" fill="url(#accent)"/>
  <rect x="64" y="166" width="12" height="4" rx="2" fill="#555"/>
  <rect x="64" y="180" width="12" height="4" rx="2" fill="#555"/>

  <!-- Code lines -->
  <rect x="84" y="110" width="60" height="4" rx="2" fill="#555"/>
  <rect x="84" y="124" width="74" height="4" rx="2" fill="#AAA"/>
  <rect x="84" y="138" width="54" height="4" rx="2" fill="#AAA"/>
  <rect x="84" y="152" width="66" height="4" rx="2" fill="#AAA"/>
  <rect x="84" y="166" width="46" height="4" rx="2" fill="#555"/>
  <rect x="84" y="180" width="62" height="4" rx="2" fill="#555"/>

  <!-- Selection glow -->
  <rect x="60" y="120" width="104" height="42" rx="4" fill="#4EC9B0" opacity="0.08"/>

  <!-- Badge with shadow -->
  <g filter="url(#badgeShadow)">
    <rect x="156" y="168" width="56" height="52" rx="10" fill="url(#badgeBg)"/>
  </g>
  <rect x="156" y="168" width="56" height="52" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Badge clip tab -->
  <rect x="170" y="163" width="28" height="10" rx="4" fill="url(#accent)"/>

  <!-- Badge text -->
  <text x="184" y="196" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#4EC9B0">:42</text>
  <text x="184" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">-58</text>

  <!-- Final top edge highlight -->
  <line x1="0" y1="0.5" x2="256" y2="0.5" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
</svg>
